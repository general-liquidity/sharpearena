# SharpeArena x prime-rl - illustrative GRPO training config.
#
# This trains a small renderer-mapped model on the SharpeArena verifiers env in one
# command (`uv run rl @ rl.toml`). It is illustrative: it was authored against the
# prime-rl config schema (configs/gsm8k/rl.toml, examples/reverse_text/rl.toml,
# examples/wordle/rl.toml) but has NOT been run by a live trainer here. The structure
# and key knobs are correct; values marked ADJUST are yours to tune for your hardware.
#
# Contract notes (encoded below):
#   * The env is an installed package driven by an integer task index. `num_tasks`
#     equals the dataset length, so `args.n_windows` sets how many distinct scenarios
#     GRPO samples over. A few hundred for a real run; >=16 for a smoke test.
#   * Qwen/Qwen3-1.7B is small and renderer-mapped, but prime-rl still requires an
#     explicit [orchestrator.renderer] for any model not auto-resolved - set below.
#   * GRPO needs within-group reward variance: group_size = 16, a stochastic train
#     temperature (~1.0), and a seq_len wide enough for the multi-turn trajectory.
#   * `args` is forwarded verbatim to `sharpearena.load_environment(**args)`.

max_steps = 100          # ADJUST - total optimizer steps
seq_len = 16384          # full multi-turn trajectory budget (obs + reasoning + action) * episode bars

[wandb]
project = "sharpearena-rl"
name = "qwen3-1.7b-sharpearena"

[model]
# Small + renderer-mapped. ADJUST to any model you can serve; if it is not
# auto-resolved you MUST keep the explicit [orchestrator.renderer] below.
name = "Qwen/Qwen3-1.7B"

[orchestrator]
batch_size = 256         # must be a multiple of group_size (256 = 16 groups x 16)
group_size = 16          # GRPO rollouts per task - within-group variance is the gradient

[orchestrator.train.sampling]
temperature = 1.0        # stochastic on-policy sampling so the 16 rollouts diverge
max_completion_tokens = 512   # per-turn budget for <reasoning> + <action>

# The training taskset. `id` is the installed env package; `args` -> load_environment.
# num_tasks = n_windows (the scenario-dataset length). Train scenarios use the
# train seed band (base 0); see the eval note below for the held-out band.
[[orchestrator.train.env]]
id = "sharpearena"
name = "sharpearena-train"
args = { n_windows = 256, n_symbols = 4, n_days = 120, max_episode_bars = 16, allow_short = true }

# Held-out evaluation for pass@k. group_size = 8 enables pass@1..pass@8.
[orchestrator.eval]
interval = 25            # eval every 25 steps

[orchestrator.eval.sampling]
temperature = 0.7        # mild stochasticity so pass@k has something to estimate over

[[orchestrator.eval.env]]
id = "sharpearena"
name = "sharpearena-eval"
group_size = 8           # pass^k reliability sampling
num_examples = 64        # held-out scenarios scored per eval
# IMPORTANT - leak-free split is the OPERATOR'S responsibility. `mode = "eval"` is the
# intended knob to draw from the disjoint eval seed band (EVAL_SEED_BASE = 1_000_000,
# see dataset.py / build_scenario_dataset). As of sharpearena 0.1.0, load_environment
# hardcodes mode="train" and does NOT forward `mode`/`seed_start`, so this key is a
# silent no-op and the eval set currently OVERLAPS the train seed band. Do not treat
# this eval as held-out until load_environment forwards `mode` to build_scenario_dataset.
# See examples/prime-rl/README.md and docs/training.md.
args = { n_windows = 64, n_symbols = 4, n_days = 120, max_episode_bars = 16, allow_short = true, mode = "eval" }

[trainer.optim]
lr = 1e-6                # ADJUST

[ckpt]                   # checkpoint at the end of training

[inference]              # default inference config

# Qwen/Qwen3-1.7B: opt into the qwen3 renderer explicitly. A model absent from
# prime-rl's MODEL_RENDERER_MAP is rejected at validation without this block.
[orchestrator.renderer]
name = "qwen3"
preserve_all_thinking = true
